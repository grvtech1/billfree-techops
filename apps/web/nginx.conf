server {
  # Rootless nginx binds an unprivileged port (no NET_BIND_SERVICE / root).
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (mirror the Cloudflare _headers policy).
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Cache hashed assets aggressively; never cache index.html.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # API + auth → the gateway (Service DNS in K8s / compose).
  location /api/ {
    proxy_pass http://api-gateway:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Authorization $http_authorization;
  }
  location /auth/ {
    proxy_pass http://api-gateway:8080;
    proxy_set_header Host $host;
  }

  # Container liveness.
  location = /healthz {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # SPA client-side routing fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
