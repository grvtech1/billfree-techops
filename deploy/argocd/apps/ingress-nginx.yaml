# Ingress controller. On a self-managed cluster there's no cloud LoadBalancer, so
# run it as a DaemonSet binding hostPort 80/443 — reachable directly on each
# node's public IP (the SG opens 80/443). Point DNS / /etc/hosts at a node IP.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          kind: DaemonSet
          hostPort:
            enabled: true
          service:
            type: ClusterIP
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
              additionalLabels:
                release: kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
