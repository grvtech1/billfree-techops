# Observability: Prometheus + Alertmanager + Grafana (kube-prometheus-stack).
# Picks up the ServiceMonitors emitted by the microservice chart, so each
# service's /metrics is scraped automatically. Grafana at svc/kube-prometheus-stack-grafana.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          # [SECURITY] No plaintext admin password in Git. The credentials live in
          # a `grafana-admin` Secret (keys: admin-user, admin-password) created
          # out-of-band by scripts/bootstrap-cluster.sh with a generated password.
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
        prometheus:
          prometheusSpec:
            # Scrape every ServiceMonitor, not only those created by this chart.
            serviceMonitorSelectorNilUsesHelmValues: false
            retention: 7d
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
