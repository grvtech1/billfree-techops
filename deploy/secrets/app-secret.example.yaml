# Bootstrap application secret. NOT synced by ArgoCD (lives outside deploy/platform).
# Create it out-of-band before the first sync. In production, replace this with a
# SealedSecret or External Secrets Operator entry so nothing sensitive is in Git.
#
#   kubectl create namespace billfree --dry-run=client -o yaml | kubectl apply -f -
#   kubectl -n billfree create secret generic billfree-app-secrets \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 24)" \
#     --from-literal=JWT_ISSUER="billfree-techops" \
#     --from-literal=DATABASE_URL="postgres://billfree:<DB_PASSWORD>@postgres:5432/billfree" \
#     --from-literal=INTAKE_API_KEY="$(openssl rand -hex 24)" \
#     --from-literal=GOOGLE_CLIENT_IDS="<client-id-1,client-id-2>"
#
# Easiest path: run scripts/bootstrap-cluster.sh, which generates all of these
# (including a matching postgres-secret) with random values.
apiVersion: v1
kind: Secret
metadata:
  name: billfree-app-secrets
  namespace: billfree
type: Opaque
stringData:
  JWT_SECRET: "<GENERATE: openssl rand -hex 24>"
  JWT_ISSUER: "billfree-techops"
  DATABASE_URL: "postgres://billfree:<DB_PASSWORD>@postgres:5432/billfree"
  # Shared key the WhatsApp chatbot sends as `x-api-key`. Read by ticket-service
  # (enables /intake routes) and api-gateway (exposes /api/intake). ≥16 chars.
  INTAKE_API_KEY: "<GENERATE: openssl rand -hex 24>"
  # Comma-separated Google OAuth client IDs. REQUIRED in production (auth-service
  # refuses to start without it unless REQUIRE_GOOGLE_AUTH=false).
  GOOGLE_CLIENT_IDS: ""
  # [GAP-15] Monthly report email dispatch — leave blank to use fallback mode.
  GEMINI_API_KEY: ""
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
  ADMIN_EMAILS: "admin@billfree.in,manager@billfree.in"
