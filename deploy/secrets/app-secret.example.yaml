# Bootstrap application secret. NOT synced by ArgoCD (lives outside deploy/platform).
# Create it out-of-band before the first sync. In production, replace this with a
# SealedSecret or External Secrets Operator entry so nothing sensitive is in Git.
#
#   kubectl create namespace billfree --dry-run=client -o yaml | kubectl apply -f -
#   kubectl -n billfree create secret generic billfree-app-secrets \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 24)" \
#     --from-literal=JWT_ISSUER="billfree-techops" \
#     --from-literal=DATABASE_URL="postgres://billfree:billfree-change-me@postgres:5432/billfree" \
#     --from-literal=INTAKE_API_KEY="$(openssl rand -hex 24)"
apiVersion: v1
kind: Secret
metadata:
  name: billfree-app-secrets
  namespace: billfree
type: Opaque
stringData:
  JWT_SECRET: "replace-with-a-32-char-random-secret"
  JWT_ISSUER: "billfree-techops"
  DATABASE_URL: "postgres://billfree:billfree-change-me@postgres:5432/billfree"
  # Shared key the WhatsApp chatbot sends as `x-api-key`. Read by ticket-service
  # (enables /intake routes) and api-gateway (exposes /api/intake). ≥16 chars.
  INTAKE_API_KEY: "replace-with-a-32-char-random-api-key"
