nameOverride: web
image:
  repository: ghcr.io/grvtech1/billfree-techops/web
  tag: "be011a773a58630b9e6e0daf0750522b6f34335a"
replicaCount: 2
containerPort: 8080
service:
  port: 80
probes:
  liveness:
    path: /healthz
  readiness:
    path: /healthz
metrics:
  enabled: false
# [SECURITY] Rootless nginx (nginxinc/nginx-unprivileged, UID 101, port 8080).
# No root, no added capabilities, read-only rootfs. nginx's pid + temp dirs are
# the only writable paths, mounted as emptyDir below.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
securityContext:
  runAsUser: 101
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
volumeMounts:
  - name: nginx-tmp
    mountPath: /tmp
  - name: nginx-cache
    mountPath: /var/cache/nginx
volumes:
  - name: nginx-tmp
    emptyDir: {}
  - name: nginx-cache
    emptyDir: {}
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75
ingress:
  enabled: true
  className: nginx
  host: ""
  path: /
  pathType: Prefix



