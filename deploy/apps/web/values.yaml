nameOverride: web
image:
  repository: ghcr.io/grvtech1/billfree-techops/web
  tag: "591070ff380475a0f6fb39509f6509a4a93b58fb"
replicaCount: 2
containerPort: 80
service:
  port: 80
probes:
  liveness:
    path: /healthz
  readiness:
    path: /healthz
metrics:
  enabled: false
# Stock nginx's master process binds :80 and writes /var/cache/nginx + pid as root,
# so override the chart's non-root defaults (the chart merges runAsUser:1000 in,
# which is what blocked nginx from creating its cache dirs).
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  fsGroup: 0
securityContext:
  runAsUser: 0
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]
    add: ["NET_BIND_SERVICE", "CHOWN", "SETUID", "SETGID"]
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75
ingress:
  enabled: true
  className: nginx
  host: billfree.example
  path: /
  pathType: Prefix
