nameOverride: auth-service
image:
  repository: ghcr.io/grvtech1/billfree-techops/auth-service
  tag: "48b3805d1ef943b0fc52fbcbdd5e172edb706f16"
replicaCount: 2
containerPort: 8080
env:
  - name: SERVICE_NAME
    value: auth-service
  - name: PORT
    value: "8080"
  # [SECURITY] Google OAuth is ENFORCED in production. REQUIRE_GOOGLE_AUTH is
  # intentionally NOT set to "false" here — leaving it unset means the service
  # defaults to requiring a verified Google ID token. GOOGLE_CLIENT_IDS is the
  # comma-separated allow-list of accepted OAuth audiences and is sourced from
  # the shared secret; the service refuses to start in prod if it is empty.
envFrom:
  # auth-service needs JWT_* and GOOGLE_CLIENT_IDS from the shared secret.
  - secretRef:
      name: billfree-app-secrets
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70



