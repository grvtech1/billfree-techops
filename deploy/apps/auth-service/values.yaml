nameOverride: auth-service
image:
  repository: ghcr.io/grvtech1/billfree-techops/auth-service
  tag: "787140da22b6afc95fa5cb4f5bbdecfe09eb34c2"
replicaCount: 2
containerPort: 8080
env:
  - name: SERVICE_NAME
    value: auth-service
  - name: PORT
    value: "8080"
envFrom:
  # auth-service only needs JWT_* from the shared secret (DATABASE_URL unused).
  - secretRef:
      name: billfree-app-secrets
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
