nameOverride: auth-service
image:
  repository: ghcr.io/grvtech1/billfree-techops/auth-service
  tag: "665f9f2f420da7ccf0bd792068970ed68a9a2bc8"
replicaCount: 2
containerPort: 8080
env:
  - name: SERVICE_NAME
    value: auth-service
  - name: PORT
    value: "8080"
  - name: REQUIRE_GOOGLE_AUTH
    value: "false"
envFrom:
  # auth-service only needs JWT_* from the shared secret (DATABASE_URL unused).
  - secretRef:
      name: billfree-app-secrets
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70



