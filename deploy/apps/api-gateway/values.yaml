nameOverride: api-gateway
image:
  repository: ghcr.io/grvtech1/billfree-techops/api-gateway
  tag: "b7fe79c0f4ef43e1da64e8ba9aec5d5776dc8570"
replicaCount: 2
containerPort: 8080
service:
  # Listen on 8080 (= container port). The web SPA's nginx proxies /api + /auth to
  # `api-gateway:8080` (to match docker-compose), so the in-cluster Service must
  # expose 8080 too — the chart default of 80 caused the SPA's login calls to hang.
  port: 8080
env:
  - name: SERVICE_NAME
    value: api-gateway
  - name: PORT
    value: "8080"
  # In-cluster service DNS (chart Service port is 80 → container 8080).
  - name: AUTH_SERVICE_URL
    value: http://auth-service:80
  - name: TICKET_SERVICE_URL
    value: http://ticket-service:80
  - name: ANALYTICS_SERVICE_URL
    value: http://analytics-service:80
  - name: CALLLOG_SERVICE_URL
    value: http://calllog-service:80
  - name: REPORT_SERVICE_URL
    value: http://report-service:80
  # [SECURITY] Lock CORS to the exact SPA origin(s). A wildcard with
  # credentials:true is both spec-invalid (browsers reject it) and a signal that
  # no allow-list is enforced. Comma-separate additional origins as needed.
  - name: CORS_ORIGINS
    value: "https://billfreetech.pages.dev"
  - name: RATE_LIMIT_MAX
    value: "200"
  # [SECURITY] Tighter per-IP limit on the unauthenticated /auth/* surface to
  # blunt credential-stuffing / token-minting floods (gateway applies this to
  # auth routes specifically; see services/api-gateway/src/server.ts).
  - name: AUTH_RATE_LIMIT_MAX
    value: "20"
envFrom:
  - secretRef:
      name: billfree-app-secrets
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 65
ingress:
  enabled: true
  className: nginx
  host: api.billfree.example
  path: /
  pathType: Prefix



