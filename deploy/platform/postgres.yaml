# Self-managed PostgreSQL (StatefulSet + PVC). For a heavier-duty setup, swap in
# the CloudNativePG operator; for the showcase this is a single durable instance.
#
# [SECURITY] The `postgres-secret` is intentionally NOT defined here. A plaintext
# password in Git is committed forever and visible to anyone with repo access.
# It is created out-of-band (with a randomly-generated password) by
# scripts/bootstrap-cluster.sh, exactly like billfree-app-secrets. ArgoCD does
# not manage it. For a fuller setup use a SealedSecret / External Secrets Operator.
# The StatefulSet below consumes it via envFrom: secretRef: postgres-secret.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: billfree
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: billfree-techops
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: billfree
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: billfree-techops
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: billfree-techops
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
