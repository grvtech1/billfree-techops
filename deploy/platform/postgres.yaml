# Self-managed PostgreSQL (StatefulSet + PVC). For a heavier-duty setup, swap in
# the CloudNativePG operator; for the showcase this is a single durable instance.
# NOTE: the password here is a demo placeholder — in production source it from a
# SealedSecret / External Secrets Operator, not plaintext in Git.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: billfree
type: Opaque
stringData:
  POSTGRES_USER: billfree
  POSTGRES_PASSWORD: billfree-change-me
  POSTGRES_DB: billfree
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: billfree
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: billfree-techops
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: billfree
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: billfree-techops
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: billfree-techops
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
