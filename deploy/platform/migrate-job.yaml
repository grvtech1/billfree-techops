# DB migration runner. The ArgoCD PreSync hook guarantees migrations apply
# before the services that depend on the schema sync. The runner is idempotent
# (tracked in schema_migrations), so re-running is safe.
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: billfree
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    app.kubernetes.io/name: db-migrate
    app.kubernetes.io/part-of: billfree-techops
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: migrate
          image: ghcr.io/grvtech1/billfree-techops/db-migrate:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: billfree-app-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
