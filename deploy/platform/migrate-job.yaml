# DB migration runner. Runs as a PostSync hook so it fires AFTER Postgres (in the
# same platform app) is synced and healthy — a PreSync hook would run before
# Postgres exists and deadlock (it can't resolve the `postgres` host). The runner
# is idempotent (tracked in schema_migrations), so re-running is safe.
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: billfree
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    app.kubernetes.io/name: db-migrate
    app.kubernetes.io/part-of: billfree-techops
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: migrate
          image: ghcr.io/grvtech1/billfree-techops/db-migrate:c9af35247768fb4badc0fd12f65671a761b2f360
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: billfree-app-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
