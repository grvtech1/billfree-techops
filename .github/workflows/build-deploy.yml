name: Build & Deploy (GitOps)

# Builds, scans, and pushes one image per service to GHCR, then bumps the image
# tags in deploy/. ArgoCD watches the repo and rolls out the changed desired state.
# This workflow runs after CI succeeds on main, so broken commits do not deploy.
#
# Protected-main writeback: `main` requires a PR + passing checks, which blocks a
# direct push from the default GITHUB_TOKEN. The GitOps tag-bump pushes with
# GITOPS_TOKEN — a fine-grained PAT from a repo admin (contents: write). Because
# branch protection has enforce_admins=false, an admin token bypasses the PR/check
# requirement for this one automated commit. The commit carries "[skip ci]" so it
# never re-triggers CI (and therefore never re-triggers this deploy). Until the
# secret exists it falls back to GITHUB_TOKEN, which will fail the push on a
# protected main — a clear signal to add GITOPS_TOKEN before enabling live GitOps.
# See docs/DEVOPS_PRACTICE.md §6.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

concurrency:
  group: build-deploy-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  build:
    name: Build, scan, push
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api-gateway, dockerfile: services/api-gateway/Dockerfile }
          - { name: ticket-service, dockerfile: services/ticket-service/Dockerfile }
          - { name: analytics-service, dockerfile: services/analytics-service/Dockerfile }
          - { name: calllog-service, dockerfile: services/calllog-service/Dockerfile }
          - { name: report-service, dockerfile: services/report-service/Dockerfile }
          - { name: auth-service, dockerfile: services/auth-service/Dockerfile }
          - { name: web, dockerfile: apps/web/Dockerfile }
          - { name: db-migrate, dockerfile: db/Dockerfile }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}

  bump-gitops:
    name: Bump image tags (GitOps)
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success' && (github.event_name == 'workflow_run' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Admin PAT so the tag-bump can push to protected main (see header).
          # Falls back to GITHUB_TOKEN, which fails the push on a protected branch.
          token: ${{ secrets.GITOPS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin deployed image tags to this commit
        run: |
          SHA="${{ env.IMAGE_TAG }}"
          for f in deploy/apps/*/values.yaml; do
            sed -i -E "s/^( *tag:).*/\1 \"$SHA\"/" "$f"
          done
          sed -i -E "s#(image: ghcr.io/.*/db-migrate:).*#\1$SHA#" deploy/platform/migrate-job.yaml

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/
          if git diff --cached --quiet; then
            echo "no image changes to commit"
          else
            git commit -m "ci: roll out ${{ env.IMAGE_TAG }} [skip ci]"
            git push
          fi
