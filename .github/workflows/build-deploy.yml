name: Build & Deploy (GitOps)

# Builds + scans + pushes one image per service to GHCR, then bumps the image
# tags in deploy/ and commits — ArgoCD watches the repo and rolls out the change.
# CI never touches the cluster directly (pull-based GitOps).
# Runs on every push to main (and manual dispatch). The GitOps tag-bump commit
# this workflow makes carries "[skip ci]", so it never re-triggers itself.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # commit the GitOps tag bump
  packages: write # push to GHCR

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build · scan · push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api-gateway, dockerfile: services/api-gateway/Dockerfile }
          - { name: ticket-service, dockerfile: services/ticket-service/Dockerfile }
          - { name: analytics-service, dockerfile: services/analytics-service/Dockerfile }
          - { name: calllog-service, dockerfile: services/calllog-service/Dockerfile }
          - { name: report-service, dockerfile: services/report-service/Dockerfile }
          - { name: auth-service, dockerfile: services/auth-service/Dockerfile }
          - { name: web, dockerfile: apps/web/Dockerfile }
          - { name: db-migrate, dockerfile: db/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load to local daemon for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Trivy vulnerability scan
        # @master always resolves; pin to a release SHA for production reproducibility.
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0' # report-only for the showcase; set to '1' to gate releases

      - name: Push image (sha + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}

  bump-gitops:
    name: Bump image tags (GitOps)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Pin deployed image tags to this commit
        run: |
          SHA=${{ github.sha }}
          for f in deploy/apps/*/values.yaml; do
            sed -i -E "s/^( *tag:).*/\1 \"$SHA\"/" "$f"
          done
          sed -i -E "s#(image: ghcr.io/.*/db-migrate:).*#\1$SHA#" deploy/platform/migrate-job.yaml
      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/
          if git diff --cached --quiet; then
            echo "no image changes to commit"
          else
            git commit -m "ci: roll out ${{ github.sha }} [skip ci]"
            git push
          fi
