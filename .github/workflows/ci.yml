name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Prettier formatting check
        run: npm run format:check

      # Dependency audit. Currently ADVISORY (|| true) because the only
      # outstanding prod-dep advisories are in `undici`, pulled transitively by
      # @fastify/http-proxy@9 → @fastify/reply-from. The fix is http-proxy v11,
      # which requires a Fastify 4→5 migration across all services (tracked
      # separately). Flip `|| true` to a hard fail once that lands.
      # TODO(security): remove `|| true` after the Fastify 5 / http-proxy 11 bump.
      - name: Dependency audit (production deps — advisory until Fastify 5)
        run: npm audit --omit=dev --audit-level=high || true

      - name: Dependency audit (full tree — advisory only)
        run: npm audit || true

      - name: Shared contract tests
        run: npm run test --workspace packages/shared

      - name: GAS backend tests
        run: npm run test --workspace apps/gas

      - name: Package type-checks
        run: npm run typecheck --workspaces --if-present

      - name: Microservice tests
        run: |
          for s in api-gateway auth-service ticket-service analytics-service calllog-service report-service; do
            echo "::group::$s"
            npm run test --workspace services/$s
            echo "::endgroup::"
          done

      - name: Web lint, test, build
        env:
          VITE_GAS_URL: ${{ secrets.VITE_GAS_URL }}
        run: |
          npm run lint --workspace apps/web
          npm run test --workspace apps/web
          npm run build --workspace apps/web

  devops-validation:
    name: Compose, Terraform, Helm validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate docker-compose
        run: docker compose config --quiet

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform fmt and validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

      - uses: azure/setup-helm@v5

      - name: Helm lint all service releases
        run: |
          for app in api-gateway auth-service ticket-service analytics-service calllog-service report-service web; do
            echo "::group::helm lint $app"
            helm lint deploy/charts/microservice -f "deploy/apps/$app/values.yaml"
            echo "::endgroup::"
          done

      - name: Helm render all service releases
        run: |
          for app in api-gateway auth-service ticket-service analytics-service calllog-service report-service web; do
            echo "::group::helm template $app"
            helm template "$app" deploy/charts/microservice -f "deploy/apps/$app/values.yaml" >/tmp/"$app".yaml
            test -s /tmp/"$app".yaml
            echo "::endgroup::"
          done
